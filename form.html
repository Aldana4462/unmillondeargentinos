<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completar datos | Un millón de argentinos</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8f7f3;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .card {
      width: min(92vw, 460px);
      background: transparent;
      border: 0;
      padding: 34px 26px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.05;
      font-weight: 700;
    }

    p {
      margin: 0 0 28px;
      color: #555;
      font-size: 16px;
      line-height: 1.4;
    }

    form {
      display: grid;
      gap: 24px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #cfc9bb;
      background: transparent;
      padding: 10px 2px;
      box-sizing: border-box;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-bottom-color: #000;
    }

    textarea {
      min-height: 96px;
      resize: none;
      overflow: hidden;
      line-height: 1.35;
    }

    .contador {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      text-align: right;
    }

    .color-wrap {
      display: grid;
      gap: 12px;
    }

    .paleta {
      display: grid;
      gap: 10px;
    }

    .mapa-color {
      width: 100%;
      height: 150px;
      border-radius: 10px;
      cursor: pointer;
      display: block;
    }

    .mapa-ayuda {
      font-size: 12px;
      color: #666;
    }

    .preview {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #555;
    }

    .preview-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #000;
    }

    button {
      border: 0;
      background: #000;
      color: #fff;
      padding: 14px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      text-align: center;
    }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 18px;
    }

    .ok { color: #0b7f2c; }
    .error { color: #b40e0e; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Estás por ocupar tu lugar</h1>
    <p>Elegí cómo querés aparecer en el mapa.</p>

    <form id="puntoForm" novalidate>
      <div>
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" type="text" maxlength="30" required>
      </div>

      <div>
        <label for="texto">Texto</label>
        <textarea id="texto" name="texto" maxlength="300" required></textarea>
        <div id="contadorTexto" class="contador">0 / 300 caracteres</div>
      </div>

      <div>
        <label for="link">Link (opcional)</label>
        <input id="link" name="link" type="text" placeholder="https://...">
      </div>

      <div class="color-wrap">
        <label>Elegí el color de tu punto</label>
        <div class="paleta">
          <canvas id="mapaColor" class="mapa-color" width="420" height="150" aria-label="Mapa de color"></canvas>
          <div class="mapa-ayuda">Elegí cualquier color desde el mapa.</div>
        </div>
        <div class="preview">
          <span id="previewDot" class="preview-dot"></span>
          <span id="previewText">Color seleccionado</span>
        </div>
      </div>

      <button type="submit">Ocupar mi lugar — $300</button>
    </form>

    <div id="msg" class="msg" aria-live="polite"></div>
  </main>

  <script>
    const SUPABASE_URL = "https://yrmzpdbszroiuhyicnwo.supabase.co/rest/v1/mensajes";
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlybXpwZGJzenJvaXVoeWljbndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTc4OTUsImV4cCI6MjA5MTc5Mzg5NX0.XC4iOw3VhVHYiUtLEXGYVbKBtWzslfHSZaaaCvB3D88";
    const AUTH_TOKEN = API_KEY;

    const form = document.getElementById("puntoForm");
    const textoInput = document.getElementById("texto");
    const contadorTexto = document.getElementById("contadorTexto");
    const mapaColor = document.getElementById("mapaColor");
    const ctxMapaColor = mapaColor.getContext("2d");
    const previewDot = document.getElementById("previewDot");
    const previewText = document.getElementById("previewText");
    const msg = document.getElementById("msg");
    let colorSeleccionado = "#000000";

    function limpiarHTML(value) {
      return String(value || "").replace(/[<>]/g, "").trim();
    }

    function setMsg(texto, tipo) {
      msg.textContent = texto;
      msg.className = "msg " + (tipo || "");
    }

    function ajustarAltoTextarea() {
      textoInput.style.height = "auto";
      textoInput.style.height = textoInput.scrollHeight + "px";
    }

    function actualizarContador() {
      contadorTexto.textContent = textoInput.value.length + " / 300 caracteres";
    }

    function actualizarPreview() {
      previewDot.style.background = colorSeleccionado;
      previewText.textContent = "Color seleccionado: " + colorSeleccionado;
    }

    function hslAHex(h, s, l) {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const fn = (n) => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, "0");
      };
      return `#${fn(0)}${fn(8)}${fn(4)}`;
    }

    function dibujarMapaColor() {
      const width = mapaColor.width;
      const height = mapaColor.height;
      const image = ctxMapaColor.createImageData(width, height);

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const h = (x / width) * 360;
          const s = 100;
          const l = 90 - (y / height) * 65;
          const hex = hslAHex(h, s, l);
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          const idx = (y * width + x) * 4;
          image.data[idx] = r;
          image.data[idx + 1] = g;
          image.data[idx + 2] = b;
          image.data[idx + 3] = 255;
        }
      }

      ctxMapaColor.putImageData(image, 0, 0);
    }

    function seleccionarColorDesdeMapa(event) {
      const rect = mapaColor.getBoundingClientRect();
      const scaleX = mapaColor.width / rect.width;
      const scaleY = mapaColor.height / rect.height;
      const x = Math.max(0, Math.min(mapaColor.width - 1, Math.floor((event.clientX - rect.left) * scaleX)));
      const y = Math.max(0, Math.min(mapaColor.height - 1, Math.floor((event.clientY - rect.top) * scaleY)));
      const pixel = ctxMapaColor.getImageData(x, y, 1, 1).data;
      colorSeleccionado = "#" + [pixel[0], pixel[1], pixel[2]].map((v) => v.toString(16).padStart(2, "0")).join("");
      actualizarPreview();
    }

    textoInput.addEventListener("input", () => {
      ajustarAltoTextarea();
      actualizarContador();
    });

    dibujarMapaColor();
    let pintandoColor = false;
    mapaColor.addEventListener("pointerdown", (event) => {
      pintandoColor = true;
      seleccionarColorDesdeMapa(event);
    });
    mapaColor.addEventListener("pointermove", (event) => {
      if (!pintandoColor) return;
      seleccionarColorDesdeMapa(event);
    });
    window.addEventListener("pointerup", () => { pintandoColor = false; });
    ajustarAltoTextarea();
    actualizarContador();
    actualizarPreview();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMsg("", "");

      const nombre = limpiarHTML(form.nombre.value);
      const texto = limpiarHTML(form.texto.value);
      const link = limpiarHTML(form.link.value);
      const color = colorSeleccionado;

      if (!nombre || nombre.length > 30) {
        setMsg("El nombre es obligatorio y debe tener hasta 30 caracteres.", "error");
        return;
      }

      if (!texto || texto.length > 300) {
        setMsg("El texto es obligatorio y debe tener hasta 300 caracteres.", "error");
        return;
      }

      if (link && !link.startsWith("https://")) {
        setMsg("El link debe empezar con https://", "error");
        return;
      }

      const body = { nombre, texto, link, color };

      try {
        const res = await fetch(SUPABASE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": API_KEY,
            "Authorization": "Bearer " + AUTH_TOKEN
          },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const detalle = await res.text();
          throw new Error("Error " + res.status + " " + detalle);
        }

        setMsg("Listo, ya ocupaste tu lugar", "ok");
        form.reset();
        colorSeleccionado = "#000000";
        ajustarAltoTextarea();
        actualizarContador();
        actualizarPreview();

        // Opcional:
        // setTimeout(() => { window.location.href = "index.html"; }, 1500);
      } catch (error) {
        console.error("Error guardando en Supabase:", error.message);
        setMsg("No se pudo guardar. Probá de nuevo.", "error");
      }
    });
  </script>
</body>
</html>
